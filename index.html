<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ QQ协议小屋 ✧</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Comic+Neue:wght@400;700&display=swap');
    
    :root {
      --bg: linear-gradient(135deg, #ffe4f3 0%, #e0d4ff 100%);
      --card: rgba(255,255,255,0.95);
      --text: #5e2a8f;
      --accent: #ff8ac7;
    }
    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #2a1b4a 0%, #1e1438 100%);
      --card: rgba(50, 35, 90, 0.95);
      --text: #d8b4ff;
      --accent: #ff6ac4;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      transition: all 0.6s;
    }

    .stars, .bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

    .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

    h1 {
      font-family: 'Comic Neue', cursive;
      font-size: 3.6rem;
      text-align: center;
      background: linear-gradient(90deg, #ff8ac7, #b38eff, #7ed6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .rainbow-btn {
      padding: 12px 26px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff8ac7, #b38eff, #7ed6ff);
      background-size: 200%;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.4s;
    }
    .rainbow-btn:hover { background-position: right; transform: scale(1.1); }

    .search-box {
      max-width: 520px;
      width: 100%;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 16px 22px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.75);
    }

    .tab-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 30px 0 20px;
    }
    .tab-btn {
      padding: 10px 24px;
      border-radius: 30px;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      font-weight: 600;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .version-list {
      max-height: 520px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .version-item {
      background: var(--card);
      padding: 16px 20px;
      border-radius: 20px;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(157, 102, 255, 0.2);
    }
    .version-item:hover {
      transform: scale(1.08);
      box-shadow: 0 15px 30px rgba(255, 138, 199, 0.4);
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(157, 102, 255, 0.25);
    }
    .version-big { 
      font-size: 2.6rem; 
      font-weight: 800; 
      margin: 15px 0; 
      cursor: pointer; 
    }

    .footer { 
      text-align: center; 
      margin-top: 80px; 
      opacity: 0.85; 
    }
  </style>
</head>
<body data-theme="light">
  <div class="stars"></div>
  <div class="bubbles" id="bubbles"></div>

  <div class="container">
    <h1>✧ QQ协议小屋 ✧</h1>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索版本号，例如 9.0.50">
        <button class="rainbow-btn" onclick="searchVersion()">搜索</button>
      </div>
      <button class="rainbow-btn" onclick="toggleDarkMode()">🌙 暗黑模式</button>
    </div>

    <!-- 最新版本（仅安卓） -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:25px;margin-bottom:50px;" id="latestCards"></div>

    <!-- 历史版本列表 -->
    <h2 style="text-align:center;margin:40px 0 20px;">📜 已支持版本列表</h2>
    <div class="tab-buttons">
      <button class="tab-btn active" data-platform="android_phone" onclick="switchPlatform(this)">📱 安卓手机</button>
      <button class="tab-btn" data-platform="android_pad" onclick="switchPlatform(this)">📟 安卓平板</button>
    </div>
    <div class="version-list" id="versionList"></div>

    <div class="footer">
      最后更新：<span id="lastUpdate"></span> ✨<br>
      Powered by GitHub Actions | 
      <a href="https://github.com/QsignDevelop/Auto-protocol-versions" style="color:var(--accent)">仓库地址</a>
    </div>
  </div>

  <script>
    async function loadLatest() {
      const container = document.getElementById('latestCards');
      container.innerHTML = '';

      const plat = [
        {key: 'android_phone', emoji: '📱', name: '安卓手机'},
        {key: 'android_pad', emoji: '📟', name: '安卓平板'}
      ];

      for (let p of plat) {
        try {
          const res = await fetch(`${p.key}.json`);
          const data = await res.json();
          const latest = data[data.length - 1] || {};
          const ver = latest.protocol_version || latest.sort_version_name || '暂无数据';

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div style="font-size:1.3rem;font-weight:700;">${p.emoji} ${p.name}</div>
            <div class="version-big" onclick="copyToClipboard('${ver}')">${ver}</div>
            <button class="rainbow-btn" style="padding:8px 24px;font-size:0.95rem;" onclick="copyToClipboard('${ver}')">复制版本号</button>
          `;
          container.appendChild(card);
        } catch(e) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div style="font-size:1.3rem;font-weight:700;">${p.emoji} ${p.name}</div><div class="version-big" style="color:#ff6b6b;">加载失败</div>`;
          container.appendChild(card);
        }
      }
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }

    async function loadVersionList(platform) {
      const container = document.getElementById('versionList');
      container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#9b6eff;">加载中，请稍等...</p>';

      try {
        const res = await fetch(`https://api.github.com/repos/QsignDevelop/Auto-protocol-versions/contents/${platform}?ref=main`);
        if (!res.ok) throw new Error();
        const files = await res.json();

        container.innerHTML = '';
        const jsonFiles = files.filter(f => f.name.endsWith('.json') && f.type === 'file')
                              .sort((a, b) => b.name.localeCompare(a.name));

        jsonFiles.forEach(file => {
          const ver = file.name.replace('.json', '');
          const item = document.createElement('div');
          item.className = 'version-item';
          item.textContent = ver;
          item.onclick = () => copyToClipboard(ver);
          container.appendChild(item);
        });

      } catch(e) {
        container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#ff6b6b;">加载失败，请确保仓库已开启 GitHub Pages</p>';
      }
    }

    function switchPlatform(btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadVersionList(btn.dataset.platform);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert(`✅ 已复制：${text}`);
      });
    }

    function searchVersion() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) return alert("请输入版本号～");

      const items = document.querySelectorAll('.version-item');
      let found = false;

      items.forEach(item => {
        if (item.textContent.toLowerCase().includes(query)) {
          item.scrollIntoView({behavior: "smooth"});
          item.style.background = '#ff8ac7';
          item.style.color = 'white';
          found = true;
          setTimeout(() => {
            item.style.background = '';
            item.style.color = '';
          }, 1800);
        }
      });

      if (!found) alert('没有找到匹配的版本哦～');
    }

    function toggleDarkMode() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    function createBubbles() {
      const container = document.getElementById('bubbles');
      for (let i = 0; i < 38; i++) {
        const b = document.createElement('div');
        const size = Math.random() * 50 + 25;
        b.style.position = 'absolute';
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.background = 'rgba(255, 180, 255, 0.28)';
        b.style.borderRadius = '50%';
        b.style.left = Math.random() * 100 + 'vw';
        b.style.bottom = '-60px';
        b.style.animation = `float ${Math.random()*22 + 16}s linear infinite`;
        b.style.animationDelay = `-${Math.random()*30}s`;
        container.appendChild(b);
      }
    }

    window.onload = () => {
      loadLatest();
      createBubbles();
      loadVersionList('android_phone');
    };
  </script>
</body>
</html>
