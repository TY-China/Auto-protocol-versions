<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ QQ协议小屋 ✧</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Comic+Neue:wght@400;700&display=swap');
    
    :root {
      --bg: linear-gradient(135deg, #fff0f5 0%, #f8e8ff 100%);
      --card: rgba(255,255,255,0.98);
      --text: #6b3a7f;
      --accent: #ff8ac7;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 2; }

    h1 {
      font-family: 'Comic Neue', cursive;
      font-size: 3.6rem;
      text-align: center;
      background: linear-gradient(90deg, #ff8ac7, #b38eff, #7ed6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .rainbow-btn {
      padding: 12px 26px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff8ac7, #b38eff, #7ed6ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .rainbow-btn:hover { transform: scale(1.08); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 25px;
      margin-bottom: 60px;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(255, 138, 199, 0.18);
    }
    .version-big { font-size: 2.7rem; font-weight: 800; margin: 18px 0; color: #6b3a7f; }

    .version-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      max-height: 560px;
      overflow-y: auto;
    }

    .version-item {
      background: var(--card);
      padding: 15px;
      border-radius: 18px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }
    .version-item:hover { background: #ffe4f0; transform: scale(1.05); }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.65); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 35px; border-radius: 24px; max-width: 460px; width: 90%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✧ QQ协议小屋 ✧</h1>

    <div class="controls">
      <div style="max-width:520px;width:100%;display:flex;gap:10px;">
        <input type="text" id="searchInput" placeholder="搜索版本号，例如 9.2.95" style="flex:1;padding:16px 22px;border:none;border-radius:50px;font-size:1.1rem;">
        <button class="rainbow-btn" onclick="searchVersion()">搜索</button>
      </div>
      <button class="rainbow-btn" onclick="toggleDarkMode()">🌙 暗黑模式</button>
    </div>

    <div class="cards" id="latestCards"></div>

    <h2 style="text-align:center;margin:50px 0 25px;">📂 已支持协议版本</h2>
    <div style="text-align:center;margin-bottom:20px;">
      <button class="rainbow-btn" onclick="loadVersionList('android_phone')" style="margin:0 8px;">📱 安卓手机</button>
      <button class="rainbow-btn" onclick="loadVersionList('android_pad')" style="margin:0 8px;">📟 安卓平板</button>
    </div>
    <div class="version-list" id="versionList"></div>

    <div style="text-align:center;margin-top:80px;opacity:0.8;">
      最后更新：<span id="lastUpdate"></span><br>
      Powered by GitHub Actions
    </div>
  </div>

  <!-- 下载弹窗 -->
  <div class="modal" id="downloadModal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <div id="modalLinks"></div>
      <button class="rainbow-btn" style="margin-top:25px;width:100%;" onclick="closeModal()">关闭</button>
    </div>
  </div>

  <script>
    const REPO = "QsignDevelop/Auto-protocol-versions";
    const BRANCH = "master";

    async function loadLatest() {
      const container = document.getElementById('latestCards');
      container.innerHTML = '';

      try {
        const res = await fetch('https://cdn-go.cn/qq-web/im.qq.com_new/latest/rainbow/mobileConfig.json');
        const data = await res.json();
        const ver = data.android?.version || '9.2.95';

        ['android_phone', 'android_pad'].forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div style="font-size:1.35rem;font-weight:700;">
              ${p === 'android_phone' ? '📱 安卓手机' : '📟 安卓平板'}
            </div>
            <div class="version-big">${ver}</div>
            <button class="rainbow-btn" onclick="showDownload('${ver}', '${p}')">查看下载链接</button>
          `;
          container.appendChild(card);
        });
      } catch(e) {}
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }

    async function loadVersionList(platform) {
      const container = document.getElementById('versionList');
      container.innerHTML = '<p style="grid-column:1/-1;text-align:center;">加载中...</p>';

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${platform}?ref=${BRANCH}`);
        const files = await res.json();

        container.innerHTML = '';
        files.filter(f => f.name.endsWith('.json'))
             .sort((a,b) => b.name.localeCompare(a.name))
             .forEach(file => {
               const ver = file.name.replace('.json','');
               const div = document.createElement('div');
               div.className = 'version-item';
               div.textContent = ver;
               div.onclick = () => showDownload(ver, platform);
               container.appendChild(div);
             });
      } catch(e) {
        container.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#ff5555;">加载失败<br>GitHub API 限制或网络问题</p>`;
      }
    }

    function showDownload(ver, platform) {
      document.getElementById('modalTitle').innerHTML = `${ver} 下载链接`;
      document.getElementById('modalLinks').innerHTML = `
        <a href="https://github.com/${REPO}/raw/${BRANCH}/${platform}/${ver}.json" target="_blank" class="rainbow-btn" style="display:block;margin:12px 0;padding:14px;text-align:center;text-decoration:none;">
          📱 下载 ${platform}/${ver}.json
        </a>
      `;
      document.getElementById('downloadModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('downloadModal').style.display = 'none';
    }

    function searchVersion() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) return;
      document.querySelectorAll('.version-item').forEach(item => {
        if (item.textContent.includes(q)) item.scrollIntoView({behavior:"smooth"});
      });
    }

    function toggleDarkMode() {
      document.body.style.background = document.body.style.background.includes('#2a1b4a') ? 'var(--bg)' : 'linear-gradient(135deg, #2a1b4a, #1e1438)';
    }

    window.onload = () => {
      loadLatest();
      loadVersionList('android_phone');
    };
  </script>
</body>
</html>
